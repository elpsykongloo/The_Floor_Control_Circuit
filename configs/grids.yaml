# 决策时钟与前瞻量网格（文档/00 §2.4）+ MVE 冻结配置（§6-E0 第 5 步、§7-G1）
clocks:
  moshi: { type: fixed_hz, hz: 12.5, step_ms: 80 }
  personaplex: { type: fixed_hz, hz: 12.5, step_ms: 80 }
  dgslm: { type: fixed_hz, hz: null, step_ms: null, note: "V4 确认离散单元帧率后回填" }
  freeze_omni:
    type: chunk
    chunk_ms: 160
    note: "V3 已核实：160 ms 音频块逐块出状态头 logits；状态头参数形状 [4, 3584]，官方判决用前三维"
  minicpm_o:
    type: dual
    decision_hz: 1.0
    note: "V1 已核实：1 Hz 指模型一秒输入时钟；每步仅传 audio_waveform，读出 is_listen 决策"

delta_grid:
  moshi_ms: [0, 80, 160, 240, 400, 800]
  personaplex_ms: [0, 80, 160, 240, 400, 800]
  dgslm_ms: [0, 100, 200, 400, 800] # 换算为最近步；V4 后按实际帧率回填
  freeze_omni_chunks: [0, 1, 2, 3]
  minicpm_o_decision_s: [0, 1, 2]
  minicpm_o_backbone_ms: [0, 250, 500, 1000]

mve:
  model: moshi
  weights: moshiko-pytorch-bf16
  mode: R1
  layers: [4, 12, 20, 28]
  targets: [T1, T4]
  # PREREG #8 δ 读法裁决（2026-07-18，用户采纳净毫秒读法）：H1 前瞻按观测截止到事件的
  # 净时间计；#8 锚定（观测截止 (s+1)·τ）下 δ=400 → 净前瞻 [320,400) ms ≥ 3 步。
  # δ=240（净 [160,240) ms，晚期整合区间）降级为描述性附表，不入 G1 判据。
  t1_delta_ms: 400
  t1_descriptive_deltas_ms: [240] # 描述性附表：同协议全量计算，无分数包条目、无裁决
  # PREREG #11（2026-07-19 用户批准）：Moshi 官方滚动缓存 context=3000 步（240 s）；
  # 全窗 7500 步运行在 3000/6000 步处出现初始 token / 替代 sink 淘汰引发的表征塌缩
  # （80/80 运行尖峰、跨会话公共方向占比 0.50→0.85、分段优势反转）。G1 分析冻结截断
  # 到规格内窗口：可用标签步 0..2998（acts 行 ≤2999，排除行 3000 尖峰）。缓存不变，
  # 仅分析侧截断；数值权威 = mve/alignment.py（本处冻结镜像，运行时强制一致性校验）。
  context_steps: 3000
  analysis_max_label_step: 2998
  n_sessions_train: 160 # 自 CANDOR 探针训练划分（60% 侧）
  n_sessions_eval: 40 # 自 CANDOR 验证划分（15% 侧）；25% 因果评估侧绝不触碰
  max_minutes_per_session: 10
  mimi_chunk_seconds: 0.08 # 官方在线路径的一帧：保持 Mimi streaming 状态与实时编码语义
  forward_chunk_steps: 128 # 保持 transformer streaming 状态，约 10.24 秒/块
  text_mode: greedy # R1 文本内心独白流：贪心自预测（冻结协议；PREREG 变更记录 #7 落实）
  inner_val_sessions: 32 # probe_train 前 32 会话为嵌套选择的 inner_val（PREREG #7）
  seeds: [0, 1, 2]
  neg_downsample_ratio: 5 # 负类:正类 = 5:1（文档/00 §8）
  # PREREG #11：全窗正式运行中 24/24 个（层×种子）格子及 Mimi 基线全部选中旧下界
  # 0.01——网格未包住最优点，向下扩展两档；选择规则（inner_val 嵌套）不变。
  probe_c_grid: [0.0001, 0.001, 0.01, 0.1, 1.0]
  bootstrap_n: 1000 # 会话级 cluster bootstrap
  g1_full_threshold: 0.05 # ≥ +0.05 → 全量 E1
  g1_backup_threshold: 0.02 # +0.02~0.05 → 备胎 MVE；全部 < +0.02 → N1

e1: # PREREG #15（2026-07-19 用户裁决 D1–D6）：E1 全量五模型设计冻结
  # 每模型缓存/分析窗（秒）= min(600, context 规格)；依据 = 论文规定（moshi/personaplex/
  # dgslm）与本机应力实测（minicpm_o 三角测量 512 s 后疑似退化、freeze_omni 富余 → 保守 300）
  windows_s:
    moshi: 240.0 # context=3000 步（PREREG #11）
    personaplex: 240.0 # 论文规定与 Moshi 相同
    minicpm_o: 300.0 # 有效上下文 >1000 s，但 512 s 后疑似退化 → 保守 300（用户 2026-07-19 裁决）
    freeze_omni: 300.0 # 有效上下文 >1000 s → 与 minicpm_o 对齐取 300（用户裁决）
    dgslm: 122.88 # 论文严格规定（四舍五入 123 s）
  common_window_s: 122.88 # 跨模型组成匹配的公共窗描述性切片（= min(windows_s)，非判据）
  # 会话集合（D2，用户 2026-07-19 裁决；冻结 candor.json 前缀切片，无新随机源）：
  n_sessions_train: 400 # E1 训练集 = probe_train[0:400]
  n_sessions_eval: 100 # E1 主评估集 = probe_val[40:140]（全新 100 会话）
  eval_slice_start: 40 # probe_val[0:40] = MVE 历史评估集，仅作历史复现，不并入 E1 主置信区间
  mve_hist_sessions: 40
  # probe_val[140:248] 共 108 会话为后备池：任何使用必须先登记 PREREG 变更
  r2: # 生成制式（D3）：主锚 = Moshi 官方音频温度；多温度/跨种子实验暂缓（用户裁决）
    temperature: 0.8
    seed: 0
  g2: # Gate G2 判据解释冻结（00 §7 的操作化，PREREG #15）
    top3_overlap_min: 2 # |∩_{3 种子} top-3 层集合| ≥ 2
    effective_rank_max: 16 # rank-k 投影性能曲线的有效秩 ≤ 16
    direction_cosine_min: 0.8 # 跨种子方向余弦（成对最小值，取绝对值）≥ 0.8
  cache: # PREREG #16(c)(d)：E1 缓存工程规格 v2（工程参数，非科学判据；主 500 会话统一重跑）
    model: moshi
    n_layers: 32 # 层号严格 0..31（计划器展开为显式列表）
    dtype: float16
    activation_layout: stacked_tlh_v2 # 每分片 [T,L,H] 堆叠（取代逐层分片；机械盘小文件治理）
    activation_chunk_steps: 128 # 与 MVE forward_chunk_steps 同步长：240 s → 24 个分片/角色
    mimi_chunk_seconds: 0.08
    text_mode: greedy # 冻结协议（PREREG #7）
    out_group: e1_r1_greedy # 输出根 <data_root>/activations/moshi/e1_r1_greedy/
    num_shards: 2 # 双卡各一个持久进程；会话按序号奇偶分片
    temperature_limit_celsius: 95 # 用户 2026-07-19 冻结阈值
    temperature_check_interval_steps: 128
    min_free_disk_gb: 200 # 每会话开跑前的磁盘余量护栏
    expected_hidden_dim: 4096 # Moshi 7B 残差流宽度；运行时不符即硬失败
