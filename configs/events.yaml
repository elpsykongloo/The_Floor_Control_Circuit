# 事件本体冻结参数（来源：文档/00_原始计划.md §2；任何变更须先登记 PREREG.md 变更记录）
grid_dt_s: 0.01 # 事件检测内部时间栅格（工程参数，非科学参数）

vad:
  backend: silero-v5
  sample_rate: 16000
  threshold: 0.5
  min_speech_ms: 120
  min_silence_ms: 180

ipu:
  merge_gap_s: 0.18 # 同通道内部间隙 < 180 ms 合并

turn_en:
  merge_gap_s: 1.0 # 同说话人相邻 IPU 间隙 < 1.0 s 且期间对方无非-backchannel IPU 则合并
  bc_max_s: 1.0 # 对方 ≤ 1.0 s 且命中 backchannel 判据的 IPU 不切断 turn

backchannel_lexicon:
  en: ["yeah", "uh-huh", "mm", "mhm", "right", "okay", "oh", "wow", "sure", "i see"]
  zh: ["嗯", "嗯嗯", "对", "对对", "是", "是的", "好", "哦", "啊", "行"]

events:
  onset_pre_silence_s: 0.4 # ONSET：此前同通道静默 ≥ 400 ms
  offset_post_silence_s: 0.4 # OFFSET：此后同通道静默 ≥ 400 ms
  yield_max_s: 1.0 # YIELD：对方重叠 onset 后 ≤ 1.0 s 内 OFFSET
  hold_min_s: 1.5 # HOLD：同上情形但继续 ≥ 1.5 s
  bc_max_s: 1.0 # BC：对方 IPU ≤ 1.0 s 且本通道 VA 未中断
  pause_min_s: 0.3 # PAUSE：turn 内静默下界
  pause_max_s: 2.0 # PAUSE：turn 内静默上界
  turnend_no_continue_s: 1.5 # TURNEND(EN)：IPU 末且 ≥ 1.5 s 无续说
  turnend_other_onset_s: 1.0 # TURNEND(EN)：或对方 ≤ 1.0 s 内 onset
  t2_offset_window_s: 0.4 # T2 标签 = agent 于 400 ms 内 OFFSET

g0:
  # G0 三层协议（2026-07-17 重构，依据首轮校准复核）：
  # 层1 协议正确性 = 金标 VAD → official 算法 vs 金标标签逐帧全等；
  # 层2 VAD 一致性 = Silero@Mimi 解码 vs 官方 VAD；层3 端到端。
  frame_hz: 12.5
  tolerance_frames: 2
  f1_threshold: 0.85 # 对 Mimi 解码域的适用性修订提案见 PREREG.md 变更记录
  # DualTurn 官方标签算法的边界参数（wp1_g0_calibrate --protocol-check --grid 全等后冻结；
  # 当前值为待验证假设）。语义见 src/floor_circuit/events/g0_official.py。
  official:
    lookahead_f: 50
    lookback_f: 50
    min_valid_f: 13
    bot_min_f: 13
    bc_max_f: 12
    bc_gap_f: 13
    bc_context_f: 50
    self_resume_valid_only: false
    other_ongoing_counts: true
    eot_at_last_speech: true
  # （历史）事件本体 → 四类的旧映射：与官方协议不一致，已不用于 Gate，仅供事件管线自身分析
  mapping:
    eot: TURNEND
    bot: ONSET
    bc: BC
    default: hold
