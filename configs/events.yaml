# 事件本体冻结参数（来源：文档/00_原始计划.md §2；任何变更须先登记 PREREG.md 变更记录）
grid_dt_s: 0.01 # 事件检测内部时间栅格（工程参数，非科学参数）

vad:
  backend: silero-v5
  sample_rate: 16000
  threshold: 0.5
  min_speech_ms: 120
  min_silence_ms: 180

ipu:
  merge_gap_s: 0.18 # 同通道内部间隙 < 180 ms 合并

turn_en:
  merge_gap_s: 1.0 # 同说话人相邻 IPU 间隙 < 1.0 s 且期间对方无非-backchannel IPU 则合并
  bc_max_s: 1.0 # 对方 ≤ 1.0 s 且命中 backchannel 判据的 IPU 不切断 turn

backchannel_lexicon:
  en: ["yeah", "uh-huh", "mm", "mhm", "right", "okay", "oh", "wow", "sure", "i see"]
  zh: ["嗯", "嗯嗯", "对", "对对", "是", "是的", "好", "哦", "啊", "行"]

events:
  onset_pre_silence_s: 0.4 # ONSET：此前同通道静默 ≥ 400 ms
  offset_post_silence_s: 0.4 # OFFSET：此后同通道静默 ≥ 400 ms
  yield_max_s: 1.0 # YIELD：对方重叠 onset 后 ≤ 1.0 s 内 OFFSET
  hold_min_s: 1.5 # HOLD：同上情形但继续 ≥ 1.5 s
  bc_max_s: 1.0 # BC：对方 IPU ≤ 1.0 s 且本通道 VA 未中断
  pause_min_s: 0.3 # PAUSE：turn 内静默下界
  pause_max_s: 2.0 # PAUSE：turn 内静默上界
  turnend_no_continue_s: 1.5 # TURNEND(EN)：IPU 末且 ≥ 1.5 s 无续说
  turnend_other_onset_s: 1.0 # TURNEND(EN)：或对方 ≤ 1.0 s 内 onset
  t2_offset_window_s: 0.4 # T2 标签 = agent 于 400 ms 内 OFFSET

g0:
  # G0 三层协议（2026-07-17 重构，依据首轮校准复核）：
  # 层1 协议正确性 = 金标 VAD → official 算法 vs 金标标签逐帧全等；
  # 层2 VAD 一致性 = Silero@Mimi 解码 vs 官方 VAD；层3 端到端。
  frame_hz: 12.5
  tolerance_frames: 2
  # G0 冻结门槛（PREREG 变更记录 #9，用户 2026-07-18 裁决；旧 0.85 的域假设对
  # Mimi 解码音频从未成立，正式退役）。确认集 = test 除目录序前 20 探索集外的 118 会话，
  # 一次性运行。层3 超上界 = 红旗（暂停 Gate、登记调查，不自动通过）。
  gate:
    layer1_exact_macro_f1: 1.0 # 层1 协议全等（金标 VAD → 库版官方算法）
    layer2_vad_f1_min: 0.90 # 层2 双通道 VAD F1 下限（确认集重估）
    layer3_corpus_band: [0.5224, 0.6024] # 层3 等价带（#14 修复后由 --derive-gate 按冻结配方重推）
    layer3_session_p10_min: 0.3395 # 会话级 P10 尾部护栏（#14 修复后同上重推）
    exploration_sessions: 20 # test 前 20 会话（目录序）= 已消耗探索集，确认集排除
    confirmation_expected_sessions: 118 # （历史）test 一次性确认集口径，已启封并裁决 fail
  # PREREG #14（2026-07-19 用户批准，处置甲第二步）：G0 层2/3 的 Mimi 解码域 VAD 阈值
  # 修复为 0.40（诊断响应面最优；无响度归一化）。**仅作用于解码音频**——顶层原始音频
  # 事件本体继续用 vad.threshold 0.5，其他模型解码器不继承。修复后流程：val 295 重估 →
  # --derive-gate 按冻结配方重推等价带与 P10（band = val点 ± 0.04；p10_min = val P10 − 0.044，
  # 均取 4 位小数，与 #9 同余量构造）→ train 侧全新一次性确认（roster 冻结见 train_confirm）。
  # 新确认完成前 G0 状态维持 fail。
  decoded_vad_threshold: 0.40
  train_confirm:
    roster: configs/splits/dualturn_train_confirm.json # wp1_g0_train_roster.py 生成后冻结
    expected_sessions: 300 # 从 1986 个从未读取的 train 会话抽取（与 val 295 规模相当）
    seed: 20260717
    derivation_report: reports/g0_gate_derivation.json # --derive-gate 产物；确认前必须存在且与本文件一致
  # DualTurn 官方标签算法：语义已定稿为官方源码逐句移植（2026-07-17，138/138 会话逐帧全等），
  # 常量硬编码于 src/floor_circuit/events/g0_official.py（min_turn=12、max_bc=12、
  # min_bc_silence=12、gap=50 帧），来源 commit 2d0db21e767b953f5017c1cc697928b54161d645。
  # 取证脚本 scripts/wp1_g0_reference_recompute.py 为独立第二实现，--protocol-check 持续对拍。
  # （历史）事件本体 → 四类的旧映射：与官方协议不一致，已不用于 Gate，仅供事件管线自身分析
  mapping:
    eot: TURNEND
    bot: ONSET
    bc: BC
    default: hold
