# 本机（Windows）路径配置：唯一权威为 文档/01_本地路径.md，此处为其机器可读子集。
# 覆盖方式：环境变量 FCC_PATHS 指向替代配置文件；FCC_DATA_ROOT 单独覆盖 data_root。
repo_root: 'C:\artificial_intelligence\repos\The_Floor_Control_Circuit'
data_root: 'D:\data_storage\The_Floor_Control_Circuit'

datasets:
  candor: 'D:\dataset\audio\Full_Duplex\CANDOR'
  smoothconv: 'D:\dataset\audio\Full_Duplex\qualialabsAI__SmoothConv'
  duplexconv: 'D:\dataset\audio\Full_Duplex\qualialabsAI__DuplexConv'
  dualturn: 'D:\dataset\audio\Full_Duplex\anyreach-ai__dualturn-switchboard-turn-taking'
  musan: 'D:\dataset\audio\MUSAN'

models:
  moshi:
    root: 'C:\artificial_intelligence\models\Full-Duplex\Moshi_family'
    venv_python: 'C:\artificial_intelligence\models\Full-Duplex\Moshi_family\.venv\Scripts\python.exe'
    weights_moshiko: 'C:\artificial_intelligence\models\Full-Duplex\Moshi_family\models\core\moshiko-pytorch-bf16'
    weights_moshika: 'C:\artificial_intelligence\models\Full-Duplex\Moshi_family\models\core\moshika-pytorch-bf16'
  personaplex:
    root: 'C:\artificial_intelligence\models\Full-Duplex\PersonaPlex'
    venv_python: 'C:\artificial_intelligence\models\Full-Duplex\PersonaPlex\.venv\Scripts\python.exe'
    weights: 'C:\artificial_intelligence\models\Full-Duplex\PersonaPlex\models\core\personaplex-7b-v1'
    offline_eval: 'C:\artificial_intelligence\models\Full-Duplex\PersonaPlex\_source\personaplex\moshi\moshi\offline.py'
  minicpm_o:
    root: 'C:\artificial_intelligence\models\Full-Duplex\MiniCPM-o-4.5'
    venv_python: 'C:\artificial_intelligence\models\Full-Duplex\MiniCPM-o-4.5\.venv\Scripts\python.exe'
  freeze_omni:
    root: 'C:\artificial_intelligence\models\Full-Duplex\Freeze-Omni'
    venv_python: 'C:\artificial_intelligence\models\Full-Duplex\Freeze-Omni\.venv\Scripts\python.exe'
    checkpoints: 'C:\artificial_intelligence\models\Full-Duplex\Freeze-Omni\_assets\checkpoints'
    audiollm_ckpt: 'C:\artificial_intelligence\models\Full-Duplex\Freeze-Omni\_assets\checkpoints\audiollm\final.pt'
    qwen_backbone: 'C:\artificial_intelligence\models\Full-Duplex\Freeze-Omni\_assets\Qwen2-7B-Instruct'
  dgslm:
    root: 'C:\artificial_intelligence\models\Full-Duplex\dGSLM'
    venv_python: 'C:\artificial_intelligence\models\Full-Duplex\dGSLM\.venv\Scripts\python.exe'
    checkpoints: 'C:\artificial_intelligence\models\Full-Duplex\dGSLM\checkpoints'
    fairseq: 'C:\artificial_intelligence\models\Full-Duplex\dGSLM\fairseq'

tts:
  root: 'C:\artificial_intelligence\models\tts\qwen3tts-custom'
  venv_python: 'C:\artificial_intelligence\models\tts\qwen3tts-custom\.venv\Scripts\python.exe'
  # 合成命令模板（V6 冻结音色后回填）。占位符：{python} {text} {voice} {out_wav} {seed}
  # 示例："{python} -m qwen3tts_custom.synth --text {text} --voice {voice} --out {out_wav} --seed {seed}"
  synth_command: null

benchmarks:
  fdbench: 'C:\artificial_intelligence\Benchmark\FDBench_v1.5'
  humdial: 'C:\artificial_intelligence\Benchmark\Humdial_Bench'
